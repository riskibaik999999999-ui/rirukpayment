<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RIRUK - Pembayaran</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 20px;
            background: radial-gradient(circle at center, #aaa 0%, #000 100%);
        }
        .container {
            max-width: 500px;
            width: 100%;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(12px);
            border-radius: 40px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.7), 0 0 0 1px rgba(255,255,255,0.15);
            overflow: hidden;
            padding: 20px 20px 30px;
            position: relative;
        }
        .notif-icon {
            position: absolute;
            top: 20px;
            right: 25px;
            font-size: 28px;
            color: white;
            cursor: pointer;
            filter: drop-shadow(0 0 6px rgba(255,255,255,0.7));
            z-index: 30;
        }
        .history-panel {
            position: absolute;
            top: 70px;
            right: 20px;
            width: 280px;
            background: rgba(15, 15, 15, 0.98);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 25px;
            padding: 18px;
            color: white;
            z-index: 40;
            display: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
        }
        .history-panel h4 {
            font-size: 1.2rem;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #333;
            padding-bottom: 8px;
        }
        .history-panel h4 button {
            background: #ff4444;
            border: none;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            cursor: pointer;
        }
        .history-list {
            max-height: 250px;
            overflow-y: auto;
            margin-bottom: 10px;
        }
        .history-item {
            background: #222;
            padding: 10px 12px;
            border-radius: 16px;
            margin-bottom: 8px;
            font-size: 0.9rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #333;
        }
        .history-item .time {
            color: #aaa;
            font-size: 0.7rem;
        }
        .empty-history {
            color: #777;
            text-align: center;
            padding: 20px 0;
            font-style: italic;
        }
        .header {
            text-align: center;
            margin-top: 10px;
            margin-bottom: 5px;
        }
        .header h1 {
            font-size: 3rem;
            font-weight: 800;
            color: white;
            letter-spacing: 2px;
            text-shadow: 0 0 15px rgba(255,255,255,0.8);
        }
        .username-verified {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin: 0 0 20px;
            color: white;
            font-size: 1.3rem;
            font-weight: 400;
        }
        .verified-badge {
            background: #1e90ff;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 16px;
            font-weight: bold;
            box-shadow: 0 0 12px #1e90ff;
        }
        .profile-photo {
            width: 170px;
            height: 170px;
            border-radius: 50%;
            margin: 0 auto 20px;
            background: #222;
            background-image: url('my foto.jpg'), url('my foto.png'), url('https://via.placeholder.com/300?text=Profile');
            background-size: cover;
            background-position: center;
            border: 4px solid white;
            box-shadow: 0 0 50px rgba(255,255,255,0.6);
        }
        .invite-text {
            text-align: center;
            color: #f0f0f0;
            font-size: 1rem;
            margin: 10px 0 25px;
            padding: 0 15px;
            line-height: 1.5;
            text-shadow: 0 2px 5px black;
        }
        .payment-section {
            margin-bottom: 30px;
        }
        .payment-methods {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .method-card {
            background: rgba(20, 20, 20, 0.7);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 40px;
            padding: 16px 22px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            transition: 0.2s;
        }
        .method-card:hover {
            background: rgba(60, 60, 60, 0.7);
            border-color: rgba(255,255,255,0.5);
        }
        .method-info {
            display: flex;
            flex-direction: column;
        }
        .method-name {
            font-weight: 700;
            font-size: 1.2rem;
            color: white;
            margin-bottom: 5px;
        }
        .method-detail {
            font-size: 0.95rem;
            color: #ccc;
            background: rgba(0,0,0,0.6);
            padding: 4px 14px;
            border-radius: 40px;
            display: inline-block;
            max-width: fit-content;
            border: 1px solid rgba(255,255,255,0.15);
        }
        .action-btn {
            color: white;
            font-weight: 600;
            font-size: 0.9rem;
            background: rgba(30, 30, 30, 0.8);
            padding: 8px 18px;
            border-radius: 40px;
            border: 1px solid rgba(255,255,255,0.25);
        }
        .qr-section {
            margin-bottom: 10px;
            text-align: center;
        }
        .qr-label {
            color: #ccc;
            margin-bottom: 10px;
            font-weight: 500;
            font-size: 1rem;
        }
        .qr-photo {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            margin: 0 auto;
            background: #222;
            background-image: url('my qr.jpg'), url('my qr.png'), url('https://via.placeholder.com/300?text=QR');
            background-size: cover;
            background-position: center;
            border: 4px solid white;
            box-shadow: 0 0 40px rgba(255,255,255,0.6);
            cursor: pointer;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-content {
            background: #111;
            max-width: 400px;
            width: 90%;
            border-radius: 50px;
            padding: 30px 24px;
            text-align: center;
            border: 2px solid white;
            box-shadow: 0 0 80px rgba(255,255,255,0.3);
        }
        .modal-content h2 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 16px;
            color: white;
        }
        .modal-content .detail-number {
            font-size: 1.5rem;
            font-weight: 600;
            background: #222;
            padding: 16px;
            border-radius: 40px;
            margin: 20px 0;
            word-break: break-all;
            color: #fff;
            border: 1px solid #444;
        }
        .modal-content .qr-image {
            width: 180px;
            height: 180px;
            border-radius: 30px;
            background: #222;
            margin: 10px auto;
            background-size: cover;
            background-position: center;
            border: 2px solid white;
            box-shadow: 0 0 40px rgba(255,255,255,0.5);
            background-image: url('my qr.jpg'), url('my qr.png'), url('https://via.placeholder.com/300?text=QR');
        }
        .modal-btn {
            background: #333;
            color: white;
            border: 1px solid white;
            padding: 14px 24px;
            border-radius: 60px;
            font-size: 1.1rem;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            margin-top: 16px;
            transition: 0.2s;
        }
        .modal-btn:hover {
            background: #555;
        }
        .modal-btn.secondary {
            background: #222;
            color: #ccc;
            border: 1px solid #444;
            margin-top: 10px;
        }
        .modal-btn.secondary:hover {
            background: #333;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="notif-icon" onclick="toggleHistory()">🔔</div>
        <div class="history-panel" id="historyPanel">
            <h4>Riwayat Aktivitas <button onclick="clearHistory()">Hapus Semua</button></h4>
            <div class="history-list" id="historyList">
                <div class="empty-history">Belum ada aktivitas</div>
            </div>
        </div>
        <div class="header">
            <h1>RIRUK</h1>
        </div>
        <div class="username-verified">
            @riruk777
            <span class="verified-badge">✓</span>
        </div>
        <div class="profile-photo"></div>
        <div class="invite-text">
            Pilih metode pembayaran yang tersedia di bawah ini. Aman, Cepat dan Terpercaya.
        </div>
        <div class="payment-section">
            <div class="payment-methods">
                <div class="method-card" onclick="showModal('Dana', '0887437316081', false)">
                    <div class="method-info">
                        <span class="method-name">Dana</span>
                        <span class="method-detail">0887 4373 16081</span>
                    </div>
                    <div class="action-btn">Detail</div>
                </div>
                <div class="method-card" onclick="showModal('Sea Bank', '901469774636', false)">
                    <div class="method-info">
                        <span class="method-name">Sea Bank</span>
                        <span class="method-detail">9014 6977 4636</span>
                    </div>
                    <div class="action-btn">Detail</div>
                </div>
                <div class="method-card" onclick="showModal('Pulsa', '089633355510', false)">
                    <div class="method-info">
                        <span class="method-name">Pulsa</span>
                        <span class="method-detail">0896 3335 5510</span>
                    </div>
                    <div class="action-btn">Detail</div>
                </div>
            </div>
        </div>
        <div class="qr-section">
            <div class="qr-label">QR Code</div>
            <div class="qr-photo" onclick="showModal('QRIS', 'my qr', true)"></div>
        </div>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <h2 id="modalTitle">Dana</h2>
            <div id="modalDetail" class="detail-number">0887437316081</div>
            <div id="modalQR" class="qr-image" style="display: none;"></div>
            <button class="modal-btn" id="modalActionBtn">Salin Nomor</button>
            <button class="modal-btn secondary" onclick="closeModal()">Tutup</button>
        </div>
    </div>

    <script>
        // Array untuk menyimpan history
        let historyItems = [];

        // Panel history
        const historyPanel = document.getElementById('historyPanel');
        const historyList = document.getElementById('historyList');

        function toggleHistory() {
            if (historyPanel.style.display === 'block') {
                historyPanel.style.display = 'none';
            } else {
                updateHistoryDisplay();
                historyPanel.style.display = 'block';
            }
        }

        // Tambah item ke history
        function addHistory(action, detail) {
            const time = new Date().toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            historyItems.unshift({ action, detail, time });
            if (historyItems.length > 10) historyItems.pop();
            updateHistoryDisplay();
        }

        // Tampilkan history
        function updateHistoryDisplay() {
            if (historyItems.length === 0) {
                historyList.innerHTML = '<div class="empty-history">Belum ada aktivitas</div>';
                return;
            }
            let html = '';
            historyItems.forEach(item => {
                html += `<div class="history-item">
                    <div><strong>${item.action}</strong><br>${item.detail}</div>
                    <div class="time">${item.time}</div>
                </div>`;
            });
            historyList.innerHTML = html;
        }

        // Hapus semua history
        function clearHistory() {
            historyItems = [];
            updateHistoryDisplay();
        }

        // Override fungsi showModal untuk mencatat history saat detail diklik
        const originalShowModal = showModal;
        window.showModal = function(nama, detail, isQR) {
            if (isQR) {
                addHistory('Lihat QR', 'QRIS');
            } else {
                addHistory('Lihat Detail', `${nama} - ${detail}`);
            }
            originalShowModal(nama, detail, isQR);
        };

        // Override fungsi copyNumber untuk mencatat history saat salin
        const originalCopyNumber = copyNumber;
        window.copyNumber = function(nomor, metode) {
            addHistory('Salin Nomor', `${metode} - ${nomor}`);
            originalCopyNumber(nomor, metode);
        };

        // Fungsi asli showModal dan copyNumber
        function showModal(nama, detail, isQR = false) {
            const modal = document.getElementById('modal');
            const modalTitle = document.getElementById('modalTitle');
            const modalDetail = document.getElementById('modalDetail');
            const modalQR = document.getElementById('modalQR');
            const modalActionBtn = document.getElementById('modalActionBtn');

            modalTitle.textContent = nama;
            if (isQR) {
                modalDetail.style.display = 'none';
                modalQR.style.display = 'block';
                modalActionBtn.textContent = 'Selesai';
                modalActionBtn.onclick = function() {
                    closeModal();
                };
            } else {
                modalDetail.style.display = 'block';
                modalQR.style.display = 'none';
                modalDetail.textContent = detail;
                modalActionBtn.textContent = 'Salin Nomor';
                modalActionBtn.onclick = function() {
                    copyNumber(detail, nama);
                };
            }
            modal.style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }

        function copyNumber(nomor, metode) {
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(nomor).then(() => {
                    alert(`Nomor ${metode} (${nomor}) disalin`);
                    closeModal();
                }).catch(() => {
                    fallbackCopy(nomor, metode);
                });
            } else {
                fallbackCopy(nomor, metode);
            }
        }

        function fallbackCopy(nomor, metode) {
            const textarea = document.createElement('textarea');
            textarea.value = nomor;
            document.body.appendChild(textarea);
            textarea.select();
            try {
                document.execCommand('copy');
                alert(`Nomor ${metode} (${nomor}) disalin`);
                closeModal();
            } catch (err) {
                alert('Gagal menyalin, salin manual: ' + nomor);
            }
            document.body.removeChild(textarea);
        }

        window.onclick = function(event) {
            const modal = document.getElementById('modal');
            if (event.target === modal) closeModal();
            if (!event.target.closest('.history-panel') && !event.target.closest('.notif-icon')) {
                historyPanel.style.display = 'none';
            }
        };
    </script>
</body>
</html>
